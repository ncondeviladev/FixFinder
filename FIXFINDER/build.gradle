plugins {
    id 'java'
    id 'application'
    id 'eclipse'
}

group = 'com.fixfinder'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    // Driver de MySQL
    implementation 'mysql:mysql-connector-java:8.0.33'
    
    // JavaFX (Dependencias explícitas para Windows)
    implementation 'org.openjfx:javafx-controls:21:win'
    implementation 'org.openjfx:javafx-fxml:21:win'
    implementation 'org.openjfx:javafx-graphics:21:win'
    implementation 'org.openjfx:javafx-base:21:win'
    
    // JUnit
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.mockito:mockito-core:5.5.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.5.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    
    // JSON (Jackson)
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    
    // Firebase Admin SDK (Para limpieza automatizada en tests)
    implementation 'com.google.firebase:firebase-admin:9.2.0'
    
    // Google Cloud Storage (necesario para DbClean)
    implementation 'com.google.cloud:google-cloud-storage:2.30.1'
}

application {
    mainClass = 'com.fixfinder.Main'
}

test {
    useJUnitPlatform()
    testLogging {
        showStandardStreams = true
        events "passed", "skipped", "failed", "standardOut", "standardError"
        exceptionFormat "full"
    }
    afterTest { desc, result -> 
        logger.lifecycle "Ejecutando Test: ${desc.className}.${desc.name} -> ${result.resultType}"
    }
}

task runServer(type: JavaExec) {
    group = 'application'
    description = 'Runs the Server'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fixfinder.red.ServidorCentral'
}

task runClient(type: JavaExec) {
    group = 'application'
    description = 'Runs the Client'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fixfinder.Main'
}



task runSchemaUpdater(type: JavaExec) {
    group = 'application'
    description = 'Runs the Schema Updater'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fixfinder.utilidades.SchemaUpdater'
}

task runSeeder(type: JavaExec) {
    group = 'application'
    description = 'Runs the Data Seeder for Testing'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fixfinder.DbClean'
    standardInput = System.in
}

task runDashboard(type: JavaExec) {
    group = 'application'
    description = 'Arranca el Panel de Gestión Principal (Gerente/Admin)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fixfinder.ui.dashboard.AppDashboardPrincipal'
    
    // Filtramos solo los JARs de JavaFX para el module-path
    // Las demás dependencias se quedan en el classpath para evitar conflictos de módulos duplicados
    doFirst {
        def javafxJars = configurations.runtimeClasspath.filter { it.name.contains('javafx') }
        jvmArgs = [
            '--module-path', javafxJars.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml,javafx.graphics'
        ]
    }
}

task runPanelPrototipo(type: JavaExec) {
    group = 'application'
    description = 'Arranca el Panel de Pruebas Independiente'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.fixfinder.LanzadorPanelPrototipo'
}

task dashboardJar(type: Jar) {
    group = 'build'
    description = 'Generates a Fat JAR for the Dashboard'
    archiveFileName = 'fixfinder-dashboard.jar'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'com.fixfinder.ui.dashboard.LauncherDashboard'
    }
    from sourceSets.main.output
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    } {
        exclude "META-INF/*.SF"
        exclude "META-INF/*.DSA"
        exclude "META-INF/*.RSA"
    }
}

jar {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    manifest {
        attributes 'Main-Class': 'com.fixfinder.red.ServidorCentral'
    }
    from sourceSets.main.output
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    } {
        exclude "META-INF/*.SF"
        exclude "META-INF/*.DSA"
        exclude "META-INF/*.RSA"
    }
}
