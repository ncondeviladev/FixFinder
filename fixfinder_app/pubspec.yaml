name: fixfinder_app
description: Aplicación móvil para el ecosistema FixFinder.
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  firebase_core: ^4.4.0
  firebase_storage: ^13.0.6
  intl: ^0.19.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#121212"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#121212"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
